<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style/style.css">
  <title>Quiz App</title>
</head>
<body>
  <header></header>
  <section class="start-menu">
    <img src="/Img/quiz.png" alt="quiz-picture">
    <button id = "start-button">Start</button>
  </section>

  <div class="quiz-container">
    <!-- Question Section -->
    <div class="question-section">
        <h2 id="question">questions</h2>
    </div>

    <!-- Answer Section -->
    <div class="answer-section" id="answer-buttons">
        <!-- Buttons for answer options will be dynamically inserted here -->
    </div>

    <!-- Next Button -->
    <button id="next-btn" style="display: none;">Next Question</button>

    <!-- Result Section -->
    <div class="result-section" id="result">
        <h2>Your Score: <span id="score">0</span> / <span id="total-questions">0</span></h2>
        <button onclick="restartQuiz()">Restart Quiz</button>
    </div>
</div>
  
  <script src="/scripts/main.js"></script>
</body>
</html>
